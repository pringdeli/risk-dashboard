<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그룹사 리스크관리 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0f17;--sur:#141720;--sur2:#1c2030;--sur3:#242840;
  --bdr:#2c3045;--bdr2:#363b52;
  --tx:#dde1f0;--mu:#7a80a0;--fa:#4a5070;
  --bl:#5b9ef7;--bll:rgba(91,158,247,.1);--blb:rgba(91,158,247,.2);
  --gn:#3ecf8e;--gnl:rgba(62,207,142,.1);--gnb:rgba(62,207,142,.2);
  --rd:#f16b6b;--rdl:rgba(241,107,107,.1);--rdb:rgba(241,107,107,.2);
  --am:#f5a623;--aml:rgba(245,166,35,.1);--amb:rgba(245,166,35,.2);
  --pu:#a78bfa;--pul:rgba(167,139,250,.1);
  --r:8px;--r2:12px;
  --sh:0 1px 3px rgba(0,0,0,.5);--shm:0 8px 32px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5}
input[type=file]{display:none}

.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 24px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;height:52px;gap:14px}
.hdr-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{font-size:18px}
.hdr-name{font-size:14px;font-weight:700;white-space:nowrap}
.hdr-sub{font-size:10px;color:var(--fa);margin-top:1px}
.div{width:1px;height:22px;background:var(--bdr);flex-shrink:0}
.nav{display:flex;gap:1px;overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;padding:5px 12px;border-radius:6px;font-size:12px;color:var(--mu);cursor:pointer;transition:.15s;font-weight:500;white-space:nowrap}
.nb:hover{color:var(--tx);background:var(--sur2)}
.nb.on{color:var(--bl);background:var(--bll);font-weight:600}
.hdr-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.hmeta{font-size:11px;color:var(--fa);white-space:nowrap}
.badge{background:var(--bll);color:var(--bl);border:1px solid var(--blb);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.up-btn{display:flex;align-items:center;gap:5px;background:var(--bl);color:#fff;border:none;border-radius:var(--r);padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.up-btn:hover{background:#4a8de8}

.main{max-width:1400px;margin:0 auto;padding:20px 24px}
.sec{display:none}.sec.on{display:block}

/* KPI */
.kg{display:grid;gap:12px;margin-bottom:14px}
.kg4{grid-template-columns:repeat(4,1fr)}
.kg8{grid-template-columns:repeat(8,1fr)}
.kc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:14px 16px;position:relative;overflow:hidden;transition:.15s}
.kc:hover{border-color:var(--bdr2)}
.kc-bl{border-top:2px solid var(--bl)}.kc-gn{border-top:2px solid var(--gn)}.kc-rd{border-top:2px solid var(--rd)}.kc-am{border-top:2px solid var(--am)}.kc-pu{border-top:2px solid var(--pu)}
.klbl{font-size:10px;font-weight:600;color:var(--fa);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.kval{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1;margin-bottom:5px;color:var(--tx)}
.kval-sm{font-size:17px}
.kval sup{font-size:12px;font-weight:500;color:var(--mu);margin-left:1px}
.ksub{font-size:11px;color:var(--mu);display:flex;align-items:center;gap:4px;flex-wrap:wrap}

/* 배지 */
.pill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px}
.pill-g{background:var(--gnl);color:var(--gn);border:1px solid var(--gnb)}
.pill-r{background:var(--rdl);color:var(--rd);border:1px solid var(--rdb)}
.pill-a{background:var(--aml);color:var(--am);border:1px solid var(--amb)}
.pill-b{background:var(--bll);color:var(--bl);border:1px solid var(--blb)}
.pill-p{background:var(--pul);color:var(--pu)}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px}
.tg{background:var(--gnl);color:var(--gn)}.tr{background:var(--rdl);color:var(--rd)}.ta{background:var(--aml);color:var(--am)}.tb{background:var(--bll);color:var(--bl)}

/* 카드 */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.chd{padding:13px 18px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:700}.cs{font-size:11px;color:var(--fa)}
.cb{padding:15px 18px}.cb0{padding:0}
.h200{position:relative;height:200px}.h240{position:relative;height:240px}.h280{position:relative;height:280px}.h300{position:relative;height:300px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* 테이블 */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--sur2);padding:8px 12px;text-align:center;font-weight:600;color:var(--mu);font-size:10.5px;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl th.L,.tbl td.L{text-align:left}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--bdr);text-align:center;color:var(--tx)}
.tbl td.L{font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl tr.tot td{background:rgba(91,158,247,.07);font-weight:700;color:var(--bl);border-top:1px solid var(--bdr)}
.tbl tr.tot2 td{background:var(--sur2);font-weight:700;border-top:1px solid var(--bdr)}

/* 직거래 박스 */
.dc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.dc-box{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:13px 15px;text-align:center}
.dc-box.hi{border-color:var(--bl);background:var(--bll)}
.dc-lbl{font-size:10px;color:var(--fa);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.dc-val{font-size:20px;font-weight:800;color:var(--bl)}
.dc-diff{font-size:11px;margin-top:3px}

/* 환입 요약 */
.ret-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.ret-box{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:13px 15px}
.ret-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.ret-name{font-size:12px;font-weight:700}
.ret-rate{font-size:19px;font-weight:800}
.ret-meta{font-size:10.5px;color:var(--fa);margin-top:2px}

/* 예산 */
.bud-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.bud-box{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r2);padding:13px 15px}
.bud-name{font-size:11px;font-weight:700;margin-bottom:6px}
.bud-bar-wrap{margin-bottom:4px}
.bud-bar-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--fa);margin-bottom:3px}
.bud-bar{height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.bud-bar-fill{height:100%;border-radius:3px}

/* 부실채권 타임라인 */
.bd-item{background:var(--sur2);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--gn)}
.bd-item.todo{border-left-color:var(--am)}
.bd-title{font-size:12px;font-weight:700;margin-bottom:5px;color:var(--tx)}
.bd-list{font-size:11.5px;color:var(--mu);line-height:1.8;padding-left:2px}

/* 업로드 오버레이 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:300;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:32px;text-align:center;max-width:380px;width:90%;box-shadow:var(--shm);position:relative}
.modal h2{font-size:16px;font-weight:800;margin-bottom:6px}
.modal p{font-size:12px;color:var(--mu);margin-bottom:20px;line-height:1.6}
.drop-z{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:22px;cursor:pointer;transition:.2s}
.drop-z:hover,.drop-z.hi{border-color:var(--bl);background:var(--bll)}
.drop-z-lbl{font-size:12px;color:var(--mu)}.drop-z-lbl b{color:var(--bl)}
.mcl{position:absolute;top:12px;right:12px;background:var(--sur2);border:none;border-radius:6px;width:26px;height:26px;color:var(--mu);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mcl:hover{color:var(--tx)}
.pgw{display:none;margin-top:16px;text-align:left}.pgw.on{display:block}
.pgh{display:flex;justify-content:space-between;margin-bottom:4px}
.pgl{font-size:11px;color:var(--mu)}.pgp{font-size:11.5px;font-weight:800;color:var(--bl)}
.pgt{width:100%;height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:9px}
.pgf{height:100%;background:linear-gradient(90deg,var(--bl),var(--gn));border-radius:2px;width:0%;transition:width .4s}
.pgs{display:flex;flex-direction:column;gap:3px}
.pss{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--fa)}
.pss.done{color:var(--gn)}.pss.cur{color:var(--bl);font-weight:600}
.pss .ic{width:13px;font-size:10px}
.emsg{background:var(--rdl);border:1px solid var(--rdb);border-radius:var(--r);padding:8px 12px;font-size:11px;color:var(--rd);margin-top:10px;display:none}
.emsg.on{display:block}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--sur2);border:1px solid var(--bdr2);color:var(--tx);font-size:12px;padding:9px 18px;border-radius:9px;z-index:999;box-shadow:var(--shm);opacity:0;transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:1100px){.kg8{grid-template-columns:repeat(4,1fr)}.g2,.g3,.dc-grid,.ret-grid,.bud-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.main{padding:12px}.hdr{padding:0 12px}.kg8,.kg4,.g2,.g3,.dc-grid,.ret-grid,.bud-grid{grid-template-columns:1fr 1fr}.hdr-name,.hdr-sub,.hmeta{display:none}.nb{font-size:11px;padding:4px 8px}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-brand">
      <span class="hdr-logo">📊</span>
      <div><div class="hdr-name">그룹사 리스크관리 대시보드</div><div class="hdr-sub">영업기획실</div></div>
    </div>
    <div class="div"></div>
    <nav class="nav">
      <button class="nb on" onclick="showTab('dash',this)">Dashboard</button>
      <button class="nb" onclick="showTab('sales',this)">매출 분석</button>
      <button class="nb" onclick="showTab('ar',this)">채권/회전일</button>
      <button class="nb" onclick="showTab('ret',this)">환입 분석</button>
      <button class="nb" onclick="showTab('pl',this)">손익 분석</button>
      <button class="nb" onclick="showTab('risk',this)">리스크</button>
      <button class="nb" onclick="showTab('bad',this)">부실채권</button>
      <button class="nb" onclick="showTab('bud',this)">예산 현황</button>
      <button class="nb" onclick="showTab('cmp',this)">그룹사 비교</button>
    </nav>
    <div class="hdr-r">
      <span class="hmeta" id="hdmeta"></span>
      <span class="badge" id="hdbadge">로딩 중...</span>
      <button class="up-btn" onclick="openUpload()">↑ 마감 업데이트</button>
    </div>
  </div>
</header>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="mcl" onclick="closeUpload()">✕</button>
    <div style="font-size:36px;margin-bottom:10px">📂</div>
    <h2>마감 파일 업로드</h2>
    <p>새 마감 파일을 올리면<br>모든 사람의 대시보드가 즉시 업데이트됩니다</p>
    <div class="drop-z" id="dz" onclick="document.getElementById('fi').click()">
      <div style="font-size:26px;margin-bottom:6px">📥</div>
      <input type="file" id="fi" accept=".xlsx,.xls" onchange="uploadFile(this.files[0])">
      <div class="drop-z-lbl">여기에 끌어다 놓거나 <b>클릭해서 선택</b></div>
    </div>
    <div class="pgw" id="pgw">
      <div class="pgh"><span class="pgl" id="pgl"></span><span class="pgp" id="pgp">0%</span></div>
      <div class="pgt"><div class="pgf" id="pgf"></div></div>
      <div class="pgs" id="pgs"></div>
    </div>
    <div class="emsg" id="emsg"></div>
  </div>
</div>

<main class="main">
  <div class="sec on" id="t-dash"></div>
  <div class="sec" id="t-sales"></div>
  <div class="sec" id="t-ar"></div>
  <div class="sec" id="t-ret"></div>
  <div class="sec" id="t-pl"></div>
  <div class="sec" id="t-risk"></div>
  <div class="sec" id="t-bad"></div>
  <div class="sec" id="t-bud"></div>
  <div class="sec" id="t-cmp"></div>
</main>
<div class="toast" id="toast"></div>

const STEPS=['파일 전송 중','서버에서 파싱 중','데이터 분석 중','저장 중','완료'];
function initPg(){document.getElementById('pgw').classList.add('on');document.getElementById('emsg').classList.remove('on');document.getElementById('pgs').innerHTML=STEPS.map((s,i)=>`<div class="pss" id="pst${i}"><span class="ic">○</span>${s}</div>`).join('');setPg(0);}
function setPg(i){const pct=Math.round(i/STEPS.length*100);document.getElementById('pgf').style.width=pct+'%';document.getElementById('pgp').textContent=pct+'%';document.getElementById('pgl').textContent=i<STEPS.length?STEPS[i]:'완료!';STEPS.forEach((_,k)=>{const el=document.getElementById('pst'+k);if(!el)return;if(k<i){el.className='pss done';el.querySelector('.ic').textContent='✓';}else if(k===i){el.className='pss cur';el.querySelector('.ic').textContent='▶';}else{el.className='pss';el.querySelector('.ic').textContent='○';}});}
async function uploadFile(file){if(!file)return;initPg();setPg(0);try{const fd=new FormData();fd.append('file',file);setPg(1);const res=await fetch('/api/data',{method:'POST',body:fd});setPg(3);if(!res.ok){const e=await res.json();throw new Error(e.error||'서버 오류');}const result=await res.json();setPg(4);await loadData();setTimeout(()=>{closeUpload();showToast('✅ '+result.year+'년 '+result.month+'월 마감 업데이트 완료!');},500);}catch(err){const el=document.getElementById('emsg');el.textContent='❌ '+err.message;el.classList.add('on');}}
async function loadData(){try{const res=await fetch('/api/data');if(!res.ok)throw new Error();applyData(await res.json());}catch{applyData(BAKED);}}
function applyData(data){window.D=data;document.getElementById('hdbadge').textContent=data.year+'.'+data.month+' 마감';document.getElementById('hdmeta').textContent=data.date+' · '+data.writer;RENDERED={};document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));document.getElementById('t-dash').classList.add('on');document.querySelectorAll('.nb').forEach((b,i)=>b.classList[i===0?'add':'remove']('on'));RENDERED['dash']=true;buildTab('dash');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3000);}

// ── 헬퍼 ──
function pill(v,u='%',inv=false){const pos=inv?(v<=0):(v>=0);return `<span class="pill ${pos?'pill-g':'pill-r'}">${v>=0?'▲':'▼'}${Math.abs(v).toFixed(1)}${u}</span>`;}
function tag(v,u='%'){return `<span class="tag ${v>=0?'tg':'tr'}">${v>=0?'+':''}${v}${u}</span>`;}
function atag(v){return `<span class="tag ${v>=95?'tg':v>=85?'ta':'tr'}">${v}%</span>`;}
function copt(u='억',ex={}){return{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'top',labels:{boxWidth:9,font:{size:10.5},color:'#7a80a0',padding:10}},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y?.toLocaleString()}${u}`},backgroundColor:'#1c2030',borderColor:'#2c3045',borderWidth:1,titleColor:'#dde1f0',bodyColor:'#7a80a0',padding:9}},scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{font:{size:9.5},color:'#4a5070'},border:{display:false}},y:{grid:{color:'rgba(255,255,255,.03)'},ticks:{font:{size:9.5},color:'#4a5070'},border:{display:false}},...ex}};}
function mkLine(id,labels,ds,u='억',ex={}){if(CHARTS[id])CHARTS[id].destroy();CHARTS[id]=new Chart(document.getElementById(id),{type:'line',data:{labels,datasets:ds},options:copt(u,ex)});}
function ds(lbl,data,color,fill=false){return{label:lbl,data,borderColor:color,backgroundColor:fill?color.replace(')',', .08)').replace('rgb','rgba'):undefined,fill,tension:.4,borderWidth:2,pointRadius:0,pointHoverRadius:4};}

    const bars=months.map(m=>{const r=b.months[m]?.sales_rate||0;const over=r>100;return`<div class="bud-bar-wrap"><div class="bud-bar-lbl"><span>${m}</span><span style="color:${over?'var(--rd)':r>=80?'var(--gn)':'var(--am)'}">${r}%</span></div><div class="bud-bar"><div class="bud-bar-fill" style="width:${Math.min(r,100)}%;background:${over?'var(--rd)':r>=80?'var(--gn)':'var(--am)'}"></div></div></div>`;}).join('');
    return`<div class="bud-box"><div class="bud-name">${co} <span style="font-size:10px;color:var(--mu)">영업예산 사용율</span></div>${bars}</div>`;
  }).join('');
  el.innerHTML=`
<div class="bud-grid">${budBoxes}</div>
<div class="g2">
  <div class="card">
    <div class="chd"><span class="ct">26.04월 예산 초과 사유</span></div>
    <div class="cb" style="font-size:12px;color:var(--mu);line-height:2">
      <div style="margin-bottom:10px"><b style="color:var(--tx)">영업예산 초과 회사</b></div>
      <div>· 대웅제약 : 전월 시상금 이월하여 집행 (+6억원) <span class="tag tr">초과</span></div>
      <div>· 대웅바이오 : 25년 시상건 처리 (+1.5억원) <span class="tag tr">초과</span></div>
      <div>· CG바이오 : 글로벌 사업부 NASS2026부스 잔금 납부</div>
      <div style="margin-top:10px"><b style="color:var(--tx)">마케팅 예산 초과 회사</b></div>
      <div>· 대웅제약 : ESG 기부금 10억 집행 <span class="tag tr">초과</span></div>
      <div>· DNC : 딥마스터코스 카데바 비용 정산</div>
    </div>
  </div>
  <div class="card">
    <div class="chd"><span class="ct">26년 예산 배정 비율</span></div>
    <div class="cb0"><table class="tbl">
      <thead><tr><th class="L">법인</th><th>배정 비율</th><th>영업</th><th>마케팅</th></tr></thead>
      <tbody>
        ${[['대웅제약','5.5%','2.75%','2.75%'],['대웅바이오','6.2%','2.6%','3.6%'],['한올바이오','11.5%','9.0%','2.5%'],['CG바이오','4.2%','1.0%','3.2%'],['DNC','4.2%','1.0%','3.2%']].map(([n,...vs])=>`<tr><td class="L">${n}</td>${vs.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table></div>
  </div>
</div>`;
}

// ══════════════════════════════════════════
// 그룹사 비교
// ══════════════════════════════════════════
function bCmp(el,d){
  const cos=['대웅제약','대웅바이오','한올바이오','디엔컴퍼니','디엔코스메틱스'];
  const dcMs=Object.keys(d.dc['대웅제약']||{}).sort(),dcLm=dcMs[dcMs.length-1]||'';
  const dc26=dcMs.filter(m=>m>='26.01');
  el.innerHTML=`
<div class="card" style="margin-bottom:14px">
  <div class="chd"><span class="ct">KPI 종합 매트릭스</span><span class="cs">녹=양호 / 황=주의 / 적=위험</span></div>
  <div class="cb0"><table class="tbl">
    <thead><tr><th class="L">그룹사</th><th>매출달성률</th><th>전년성장</th><th>직거래율</th><th>환입율</th><th>예산사용</th><th>리스크</th></tr></thead>
    <tbody>
      ${cos.map(co=>{
        const si=d.sales[co]||{},dcM=Object.keys(d.dc[co]||{}).sort(),dcV=dcM.length?d.dc[co][dcM[dcM.length-1]]:null;
        const bud=d.budget?.[co]?.months?.['4월']?.sales_rate||0;
        const risk=si.achieve>=90&&si.yoy>=0?'양호':si.achieve>=80?'주의':'위험';
        const rCls=risk==='양호'?'tg':risk==='주의'?'ta':'tr';
        return`<tr><td class="L">${co}</td><td>${atag(si.achieve)}</td><td>${tag(si.yoy,'%')}</td><td>${dcV!=null?dcV+'%':'—'}</td><td>${d.ret[co]?.latest_rate||0}%</td><td><span class="tag ${bud>100?'tr':bud>=80?'tg':'ta'}">${bud>100?'초과':bud>=80?'정상':'미달'}</span></td><td><span class="tag ${rCls}">${risk}</span></td></tr>`;}).join('')}
    </tbody>
  </table></div>
</div>
<div class="g2">
  <div class="card"><div class="chd"><span class="ct">직거래율 성장 추이 (26.1~${d.month})</span></div><div class="cb"><div class="h280"><canvas id="c-c-dc"></canvas></div></div></div>
  <div class="card"><div class="chd"><span class="ct">법인별 환입율 비교</span><span class="cs">${d.year}년 ${d.month}월</span></div><div class="cb"><div class="h280"><canvas id="c-c-ret"></canvas></div></div></div>
</div>`;
  mkLine('c-c-dc',dc26,[ds('대웅제약',dc26.map(m=>d.dc['대웅제약']?.[m]||null),CO.dw),ds('대웅바이오',dc26.map(m=>d.dc['대웅바이오']?.[m]||null),CO.bio),ds('한올바이오',dc26.map(m=>d.dc['한올바이오']?.[m]||null),CO.hanol)],'%');
  const retCos=['대웅제약','대웅바이오','한올바이오','시지바이오','디엔컴퍼니','디엔코스메틱스'];
  if(CHARTS['c-c-ret'])CHARTS['c-c-ret'].destroy();
  CHARTS['c-c-ret']=new Chart(document.getElementById('c-c-ret'),{type:'bar',data:{labels:retCos,datasets:[{data:retCos.map(c=>d.ret[c]?.latest_rate||0),backgroundColor:[CO.dw,CO.bio,CO.hanol,CO.sijee,CO.dnc,CO.dncos].map(c=>c+'44'),borderColor:[CO.dw,CO.bio,CO.hanol,CO.sijee,CO.dnc,CO.dncos],borderWidth:1.5,borderRadius:4}]},options:{...copt('%'),plugins:{...copt('%').plugins,legend:{display:false}}}});
}

// 시작
loadData();
</script>
